apiVersion: v1
kind: ServiceAccount
metadata:
  name: inframind
  namespace: inframind
  annotations:
    # Replace with a dedicated AWS read-only discovery role when running on EKS.
    eks.amazonaws.com/role-arn: arn:aws:iam::YOUR_ACCOUNT_ID:role/inframind-read-only
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inframind-api
  namespace: inframind
spec:
  replicas: 2
  selector:
    matchLabels: { app: inframind-api }
  template:
    metadata:
      labels:
        app: inframind-api
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: inframind
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: api
          image: YOUR_REGISTRY/inframind-digital-twin:0.1.0
          ports: [{ containerPort: 8000, name: http }]
          envFrom:
            - secretRef: { name: inframind-runtime }
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { cpu: "1", memory: 1Gi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 8
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: inframind-api
  namespace: inframind
spec:
  selector: { app: inframind-api }
  ports: [{ port: 80, targetPort: http, name: http }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: inframind-api
  namespace: inframind
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: inframind-api }
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
